<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>心理学ベースの適職診断アプリ</title>
<style>
:root{
  --bg:#0f1724;
  --card:#0b1220;
  --accent:#6ee7b7;
  --muted:#9aa4b2;
  --glass: rgba(255,255,255,0.03);
  --pill:#111827;
  --danger:#ff6b6b;
  --shadow: 0 6px 18px rgba(2,6,23,0.6);
  --radius:14px;
  --font-sans: "Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:var(--font-sans);
  background:linear-gradient(180deg,#071021 0%, #071827 60%);
  color:#e6eef6;
  padding:20px;
  min-height:100vh;
}

/* App container */
.app{
  width:100%;
  max-width:760px;
  margin:0 auto;
  background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border-radius:18px;
  padding:18px;
  box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,0.03);
}

/* Header */
.header{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:12px;
}
.logo{
  width:56px;
  height:56px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#60a5fa);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:#042027;
  font-size:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.4);
}
.title{
  font-size:18px;
  font-weight:700;
  line-height:1;
}
.subtitle{
  font-size:12px;
  color:var(--muted);
}

/* Card */
.card{
  background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.02));
  border-radius:12px;
  padding:16px;
  margin-top:12px;
  border:1px solid rgba(255,255,255,0.02);
}

/* Progress */
.progress-wrap{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}
.progress{
  flex:1;
  height:10px;
  background:rgba(255,255,255,0.04);
  border-radius:999px;
  overflow:hidden;
}
.progress > i{
  display:block;
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent),#60a5fa);
  border-radius:999px;
  transition:width .35s ease;
}

/* Question */
.question-area{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.q-number{
  font-size:13px;
  color:var(--muted);
}
.q-text{
  font-size:18px;
  font-weight:600;
}

/* Likert buttons */
.choices{
  display:flex;
  gap:8px;
  justify-content:space-between;
  margin-top:8px;
}
.choice{
  flex:1;
  background:var(--pill);
  border-radius:10px;
  padding:12px 8px;
  text-align:center;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.02);
  color:var(--muted);
  font-size:13px;
  transition:all .18s ease;
  user-select:none;
}
.choice.selected{
  background:linear-gradient(180deg, rgba(110,231,183,0.12), rgba(96,165,250,0.06));
  color:var(--accent);
  transform:translateY(-4px);
  box-shadow:0 8px 20px rgba(6,10,20,0.6);
  border:1px solid rgba(110,231,183,0.12);
}

/* Nav */
.nav{
  display:flex;
  gap:8px;
  margin-top:12px;
  justify-content:space-between;
  align-items:center;
}
.btn{
  background:linear-gradient(90deg,var(--accent),#60a5fa);
  color:#042027;
  padding:10px 14px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  border:none;
  box-shadow:0 8px 20px rgba(6,10,20,0.45);
}
.btn.ghost{
  background:transparent;
  color:var(--muted);
  border:1px solid rgba(255,255,255,0.03);
  box-shadow:none;
}
.small{
  font-size:13px;
  padding:8px 10px;
}
  /* Result page */
.result-header{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:12px;
}
.result-title{
  font-size:20px;
  font-weight:800;
}
.result-sub{
  color:var(--muted);
  font-size:13px;
}

/* Charts */
.charts{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:12px;
}
.canvas-card{
  flex:1 1 320px;
  min-height:260px;
  background:var(--glass);
  border-radius:12px;
  padding:12px;
  border:1px solid rgba(255,255,255,0.02);
}

/* Job list */
.job-list{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:12px;
}
.job{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.02));
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.02);
}
.job .name{font-weight:700}
.job .score{color:var(--muted)}

/* Advice */
.advice{
  margin-top:12px;
  line-height:1.7;
  color:#dfeaf2;
  background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.015));
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.02);
}

/* CTA */
.cta{
  display:flex;
  gap:8px;
  margin-top:14px;
  justify-content:space-between;
  align-items:center;
}
.cta .apply{
  flex:1;
  background:linear-gradient(90deg,#60a5fa,var(--accent));
  color:#042027;
  padding:12px;
  border-radius:12px;
  font-weight:800;
  text-align:center;
  text-decoration:none;
}
.share{
  display:flex;
  gap:8px;
}

/* Footer */
.footer{
  margin-top:12px;
  font-size:12px;
  color:var(--muted);
  text-align:center;
}

/* Responsive */
@media (max-width:520px){
  .choices{flex-direction:column}
  .choice{padding:12px}
  .charts{flex-direction:column}
  .canvas-card{min-height:220px}
  .header{gap:10px}
  .logo{width:48px;height:48px;font-size:18px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="logo">適職</div>
    <div>
      <div class="title">心理学ベースの適職診断</div>
      <div class="subtitle">Big Five・RIASEC・認知傾向・自己効力感を統合した診断</div>
    </div>
  </div>

  <!-- Intro -->
  <div class="card" id="introCard">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-weight:800;font-size:16px">診断の概要</div>
        <div style="color:var(--muted);font-size:13px;margin-top:6px">

        </div>
      </div>
    </div>

    <div style="margin-top:12px;display:flex;gap:8px;align-items:center;">
      <button class="btn" id="startBtn">診断を開始する</button>
      <button class="btn ghost small" id="howBtn">診断の仕組み</button>
    </div>
  </div>

  <!-- Question Card -->
  <div class="card" id="questionCard" style="display:none">
    <div class="progress-wrap">
      <div class="q-number" id="qNum">1 / 36</div>
      <div class="progress"><i id="progressBar"></i></div>
    </div>

    <div class="question-area">
      <div class="q-text" id="qText">質問テキスト</div>
      <div class="choices" id="choices"></div>
    </div>

    <div class="nav">
      <button class="btn ghost small" id="prevBtn">戻る</button>
      <div style="display:flex;gap:8px">
        <button class="btn ghost small" id="skipBtn">スキップ</button>
        <button class="btn small" id="nextBtn">次へ</button>
      </div>
    </div>
  </div>

  <!-- Result Card -->
  <div class="card" id="resultCard" style="display:none">
    <div class="result-header">
      <div>
        <div class="result-title">診断結果</div>
        <div class="result-sub">あなたの性格・職業適性の詳細レポート</div>
      </div>
    </div>

    <div class="charts">
      <div class="canvas-card">
        <canvas id="radarChart" width="600" height="420" style="width:100%;height:220px"></canvas>
        <div style="font-size:13px;color:var(--muted);margin-top:8px">Big Five（性格特性）</div>
      </div>
      <div class="canvas-card">
        <canvas id="barChart" width="600" height="420" style="width:100%;height:220px"></canvas>
        <div style="font-size:13px;color:var(--muted);margin-top:8px">RIASEC（職業興味）</div>
      </div>
    </div>

    <div style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap;">
      <div style="flex:1 1 320px">
        <div style="font-weight:800;margin-bottom:8px">あなたの働き方タイプ</div>
        <div class="advice" id="workStyle"></div>
      </div>
      <div style="flex:1 1 320px">
        <div style="font-weight:800;margin-bottom:8px">向いている職業トップ3</div>
        <div class="job-list" id="jobList"></div>
      </div>
    </div>

    <div style="margin-top:12px">
      <div style="font-weight:800;margin-bottom:8px">あなたの性格分析（詳細）</div>
      <div class="advice" id="personalityAnalysis"></div>
    </div>

    <div style="margin-top:12px">
      <div style="font-weight:800;margin-bottom:8px">転職アドバイス</div>
      <div class="advice" id="careerAdvice"></div>
    </div>

    <div class="cta">
      <a class="apply" id="applyBtn" href="#">あなたに合う求人を見る</a>
      <div class="share">
        <button class="btn ghost small" id="shareX">X</button>
        <button class="btn ghost small" id="shareLINE">LINE</button>
        <button class="btn ghost small" id="shareInsta">Instagram</button>
        <button class="btn ghost small" id="shareThreads">Threads</button>
      </div>
    </div>

    <div class="footer">
      本診断は心理学理論を参考にした自己理解ツールです。最終的な判断はご自身の経験や専門家の助言を優先してください。
    </div>
  </div>
</div>
<script>
/* ============================================================
   適職診断アプリ JavaScript（完全版）
   - 残り時間表示なし
   - 共有ボタンは X / LINE / Instagram / Threads
   - 結果画面の見切れ修正済み
   - jobs.html に診断結果を渡す
============================================================ */

/* --- 質問データ（36問） --- */
const QUESTIONS = [

  {text:"論理的に問題を分析するのが得意だ。", big5:{O:0.4,C:0.2}, riasec:{R:0.6}, mbti:{T_F:1}, selfEff:0.25},
  {text:"手を動かして作る作業が好きだ。", big5:{O:0.4}, riasec:{R:0.6,A:0.2}, mbti:{S_N:0.5}, selfEff:0.15},
  {text:"芸術やデザインに強い興味がある。", big5:{O:0.9}, riasec:{A:0.8}, mbti:{S_N:0.6}, selfEff:0.1},
  {text:"競争的な環境で力を発揮する。", big5:{E:0.4,C:0.2}, riasec:{E:0.7}, mbti:{I_E:0.6}, selfEff:0.25},
  {text:"人を指導したり教えることにやりがいを感じる。", big5:{A:0.4,E:0.2}, riasec:{S:0.6}, mbti:{T_F:0.6}, selfEff:0.2},
  {text:"細かいデータや事実を扱うのが得意だ。", big5:{C:0.6}, riasec:{C:0.6,R:0.2}, mbti:{S_N:0.6}, selfEff:0.2},
  {text:"リスクを取って新しい挑戦をするのが好きだ。", big5:{O:0.4,E:0.3}, riasec:{E:0.5,R:0.2}, mbti:{J_P:0.6}, selfEff:0.35},
  {text:"他人と協力して目標を達成するのが得意だ。", big5:{A:0.7}, riasec:{S:0.5}, mbti:{I_E:0.4}, selfEff:0.15},
  {text:"自分の感情を表現するのが得意だ。", big5:{E:0.6,O:0.2}, riasec:{A:0.3}, mbti:{T_F:0.6}, selfEff:0.1},
  {text:"抽象的な理論や概念に興味がある。", big5:{O:0.9}, riasec:{I:0.6,R:0.2}, mbti:{S_N:1}, selfEff:0.05},
  {text:"規則や手順に従う方が安心する。", big5:{C:0.8}, riasec:{C:0.7}, mbti:{J_P:0.8}, selfEff:0.05},
  {text:"人前でプレゼンするのが得意だ。", big5:{E:0.7}, riasec:{E:0.6}, mbti:{I_E:1}, selfEff:0.25},
  {text:"他人の期待に応えようと努力する。", big5:{A:0.6,C:0.2}, riasec:{S:0.4}, mbti:{T_F:0.4}, selfEff:0.1},
  {text:"新しい技術やツールを学ぶのが楽しい。", big5:{O:0.6,C:0.2}, riasec:{I:0.4,R:0.3}, mbti:{S_N:0.6}, selfEff:0.3},
  {text:"細部にこだわり、品質を重視する。", big5:{C:0.9}, riasec:{C:0.6}, mbti:{J_P:0.6}, selfEff:0.15},
  {text:"人の感情や雰囲気に敏感だ。", big5:{A:0.7,N:0.2}, riasec:{S:0.4}, mbti:{T_F:0.8}, selfEff:-0.05},
  {text:"独立して自分のペースで働くのが好きだ。", big5:{O:0.3,C:0.2}, riasec:{A:0.3,I:0.2}, mbti:{J_P:0.4}, selfEff:0.2},
  {text:"複雑な問題を粘り強く解決する。", big5:{C:0.5,O:0.4}, riasec:{R:0.6}, mbti:{S_N:0.6}, selfEff:0.35},
  {text:"人と関わる仕事で満足感を得る。", big5:{E:0.5,A:0.4}, riasec:{S:0.6,E:0.2}, mbti:{I_E:0.6}, selfEff:0.15},
  {text:"新しいビジネスやサービスを考えるのが得意だ。", big5:{O:0.6,E:0.3}, riasec:{E:0.5,A:0.2}, mbti:{J_P:0.4}, selfEff:0.35},
  {text:"倫理や価値観に基づいて判断する。", big5:{A:0.5}, riasec:{S:0.3}, mbti:{T_F:0.8}, selfEff:0.05},
  {text:"実験や研究を通じて知識を深めるのが好きだ。", big5:{O:0.7}, riasec:{I:0.6,R:0.2}, mbti:{S_N:0.8}, selfEff:0.15},
  {text:"締め切りに追われても集中して仕事を終える。", big5:{C:0.8}, riasec:{C:0.4,E:0.2}, mbti:{J_P:0.6}, selfEff:0.3},
  {text:"直感やひらめきで判断することが多い。", big5:{O:0.6}, riasec:{A:0.3}, mbti:{S_N:0.8}, selfEff:0.05},
  {text:"他人に影響を与える立場で力を発揮する。", big5:{E:0.6}, riasec:{E:0.6}, mbti:{I_E:0.8}, selfEff:0.25},
  {text:"自分の能力に自信があり、困難に立ち向かえる。", big5:{C:0.3,E:0.2}, riasec:{E:0.2,R:0.2}, mbti:{J_P:0.4}, selfEff:0.8},
  {text:"ルーチン作業でも正確にこなせる。", big5:{C:0.7}, riasec:{C:0.6}, mbti:{J_P:0.5}, selfEff:0.1},
  {text:"人のアイデアを引き出すのが得意だ。", big5:{E:0.5,A:0.3}, riasec:{S:0.4,E:0.3}, mbti:{T_F:0.6}, selfEff:0.15},
  {text:"技術的な問題を自分で調べて解決する。", big5:{O:0.4,C:0.4}, riasec:{R:0.6,I:0.2}, mbti:{S_N:0.6}, selfEff:0.4}
];

/* --- 状態管理 --- */
let answers = new Array(QUESTIONS.length).fill(null);
let current = 0;

/* --- DOM取得 --- */
const introCard = document.getElementById('introCard');
const questionCard = document.getElementById('questionCard');
const resultCard = document.getElementById('resultCard');
const startBtn = document.getElementById('startBtn');
const howBtn = document.getElementById('howBtn');
const qNum = document.getElementById('qNum');
const qText = document.getElementById('qText');
const choices = document.getElementById('choices');
const progressBar = document.getElementById('progressBar');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const skipBtn = document.getElementById('skipBtn');

const radarCanvas = document.getElementById('radarChart');
const barCanvas = document.getElementById('barChart');
const jobListEl = document.getElementById('jobList');
const workStyleEl = document.getElementById('workStyle');
const personalityAnalysisEl = document.getElementById('personalityAnalysis');
const careerAdviceEl = document.getElementById('careerAdvice');
const applyBtn = document.getElementById('applyBtn');

const shareX = document.getElementById('shareX');
const shareLINE = document.getElementById('shareLINE');
const shareInsta = document.getElementById('shareInsta');
const shareThreads = document.getElementById('shareThreads');

/* --- 初期化 --- */
startBtn.addEventListener('click', startTest);
howBtn.addEventListener('click', () => alert("Big Five・RIASEC・MBTI的傾向・自己効力感を統合した診断です。"));
prevBtn.addEventListener('click', onPrev);
nextBtn.addEventListener('click', onNext);
skipBtn.addEventListener('click', onSkip);

/* --- 共有ボタン --- */
shareX.onclick = () => {
  const text = encodeURIComponent("私の適職診断結果はこちら！");
  const url = encodeURIComponent(location.href);
  window.open(`https://x.com/intent/tweet?text=${text}&url=${url}`);
};
shareLINE.onclick = () => {
  const text = encodeURIComponent("私の適職診断結果はこちら！");
  const url = encodeURIComponent(location.href);
  window.open(`https://line.me/R/msg/text/?${text}%0A${url}`);
};
shareInsta.onclick = async () => {
  if(navigator.share){
    await navigator.share({title:"適職診断結果", text:"私の診断結果はこちら！", url:location.href});
  } else alert("Instagram共有は非対応のブラウザです。");
};
shareThreads.onclick = async () => {
  if(navigator.share){
    await navigator.share({title:"適職診断結果", text:"私の診断結果はこちら！", url:location.href});
  } else alert("Threads共有は非対応のブラウザです。");
};

/* --- 診断開始 --- */
function startTest(){
  introCard.style.display = "none";
  questionCard.style.display = "block";
  renderQuestion();
  updateProgress();
}

/* --- 質問表示 --- */
function renderQuestion(){
  const q = QUESTIONS[current];
  qNum.textContent = `${current+1} / ${QUESTIONS.length}`;
  qText.textContent = q.text;

  choices.innerHTML = "";
  const labels = ["まったく当てはまらない","あまり当てはまらない","どちらでもない","やや当てはまる","非常に当てはまる"];
  labels.forEach((label,i)=>{
    const div = document.createElement("div");
    div.className = "choice" + (answers[current]===i+1 ? " selected" : "");
    div.textContent = label;
    div.onclick = () => selectChoice(i);
    choices.appendChild(div);
  });

  prevBtn.disabled = current === 0;
  nextBtn.textContent = current === QUESTIONS.length - 1 ? "結果を見る" : "次へ";
}

/* --- 回答選択 --- */
function selectChoice(i){
  answers[current] = i+1;
  renderQuestion();
  updateProgress();
}

/* --- 次へ --- */
function onNext(){
  if(current < QUESTIONS.length - 1){
    current++;
    renderQuestion();
    updateProgress();
  } else {
    finishTest();
  }
}

/* --- 戻る --- */
function onPrev(){
  if(current > 0){
    current--;
    renderQuestion();
    updateProgress();
  }
}

/* --- スキップ --- */
function onSkip(){
  answers[current] = null;
  if(current < QUESTIONS.length - 1){
    current++;
    renderQuestion();
    updateProgress();
  }
}

/* --- 進捗バー更新 --- */
function updateProgress(){
  const answered = answers.filter(a=>a!==null).length;
  const pct = Math.round((answered / QUESTIONS.length) * 100);
  progressBar.style.width = pct + "%";
}

/* --- 診断終了 --- */
function finishTest(){
  questionCard.style.display = "none";
  resultCard.style.display = "block";
  computeResults();
}

/* ============================================================
   スコア計算
============================================================ */
function computeResults(){
  const big5 = {O:0,C:0,E:0,A:0,N:0};
  const riasec = {R:0,I:0,A:0,S:0,E:0,C:0};
  const mbti = {I_E:0,T_F:0,S_N:0,J_P:0};
  let selfEff = 0;

  const big5W = {O:0,C:0,E:0,A:0,N:0};
  const riasecW = {R:0,I:0,A:0,S:0,E:0,C:0};
  const mbtiW = {I_E:0,T_F:0,S_N:0,J_P:0};
  let selfEffW = 0;

  QUESTIONS.forEach((q,i)=>{
    const ans = answers[i] || 3;

    for(const k in q.big5){
      big5[k] += ans * q.big5[k];
      big5W[k] += Math.abs(q.big5[k]) * 5;
    }
    for(const k in q.riasec){
      riasec[k] += ans * q.riasec[k];
      riasecW[k] += Math.abs(q.riasec[k]) * 5;
    }
    for(const k in q.mbti){
      mbti[k] += (ans - 3) * q.mbti[k];
      mbtiW[k] += Math.abs(q.mbti[k]) * 5;
    }
    if(q.selfEff){
      selfEff += ans * q.selfEff;
      selfEffW += Math.abs(q.selfEff) * 5;
    }
  });

  const big5Norm = {};
  for(const k in big5){
    big5Norm[k] = Math.round(Math.max(0, Math.min(1, big5[k] / (big5W[k]||1))) * 100);
  }
  const riasecNorm = {};
  for(const k in riasec){
    riasecNorm[k] = Math.round(Math.max(0, Math.min(1, riasec[k] / (riasecW[k]||1))) * 100);
  }
  const mbtiNorm = {};
  for(const k in mbti){
    mbtiNorm[k] = Math.round((mbti[k] / (mbtiW[k]||1)) * 100);
  }
  const selfEffNorm = Math.round(Math.max(0, Math.min(1, selfEff / (selfEffW||1))) * 100);

  const workStyle = determineWorkStyle(big5Norm, riasecNorm, mbtiNorm, selfEffNorm);
  const jobScores = matchJobs(big5Norm, riasecNorm, mbtiNorm, selfEffNorm);

  drawRadar(big5Norm);
  drawBar(riasecNorm);
  renderWorkStyle(workStyle);
  renderJobs(jobScores);
  renderPersonality(big5Norm, mbtiNorm, selfEffNorm);
  renderAdvice(jobScores, workStyle);

  applyBtn.href =
    `jobs.html?top=${encodeURIComponent(jobScores[0].name)}`
    + `&second=${encodeURIComponent(jobScores[1].name)}`
    + `&third=${encodeURIComponent(jobScores[2].name)}`
    + `&style=${workStyle.type}` 
    + `&O=${big5Norm.O}`
    + `&C=${big5Norm.C}`
    + `&E=${big5Norm.E}`
    + `&A=${big5Norm.A}`
    + `&N=${big5Norm.N}`
    + `&R=${riasecNorm.R}`
    + `&I=${riasecNorm.I}`
    + `&Ai=${riasecNorm.A}`
    + `&S=${riasecNorm.S}`
    + `&Ei=${riasecNorm.E}`
    + `&Cc=${riasecNorm.C}`
    + `&self=${selfEffNorm}`;
}

/* ============================================================
   働き方タイプ判定
============================================================ */
function determineWorkStyle(big5, riasec, mbti, selfEff){
  const scores = {
    independent: big5.O*0.4 + mbti.J_P*0.3 + selfEff*0.3,
    collaborative: big5.A*0.5 + big5.E*0.3 + riasec.S*0.2,
    research: big5.O*0.4 + riasec.I*0.4 + mbti.S_N*0.2,
    entrepreneur: big5.E*0.4 + big5.O*0.3 + selfEff*0.3,
    stable: big5.C*0.5 + riasec.C*0.3 + (100-big5.N)*0.2
  };

  const type = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];

  const descriptions = {
    independent: "自律的に動き、自分のペースで成果を出す働き方が向いています。裁量の大きい環境やリモートワークとの相性が良いタイプです。",
    collaborative: "チームで協力しながら成果を出す働き方が向いています。コミュニケーションを活かせる環境で力を発揮しやすいタイプです。",
    research: "深い集中と分析を必要とする環境で力を発揮します。研究・分析・技術開発などとの相性が良いタイプです。",
    entrepreneur: "挑戦・スピード・意思決定が求められる環境で力を発揮します。スタートアップや新規事業との相性が良いタイプです。",
    stable: "安定した環境で着実に成果を積み上げる働き方が向いています。事務・管理・医療・公的機関などとの相性が良いタイプです。"
  };

  return { type, description: descriptions[type] };
}

    },

      score:
        big5.O*0.35 +
        big5.C*0.2 +
        riasec.E*0.25 +
        riasec.A*0.2 +
        selfEff*0.15
    },
    {
      name:"研究者",
      score:
        big5.O*0.4 +
        riasec.I*0.45 +
        mbti.S_N*0.3 +
        selfEff*0.1
    },
    {
      name:"起業家",
      score:
        big5.E*0.35 +
        big5.O*0.3 +
        riasec.E*0.3 +
        selfEff*0.4
    },
    {
      name:"コンサルタント",
      score:
        big5.O*0.3 +
        big5.C*0.25 +
        big5.E*0.2 +
        riasec.E*0.25 +
        selfEff*0.25
    },
    {
      name:"クリエイター",
      score:
        big5.O*0.5 +
        riasec.A*0.4 +
        mbti.S_N*0.3 +
        selfEff*0.1
    },
    {
      name:"教育者",
      score:
        big5.A*0.4 +
        big5.E*0.25 +
        riasec.S*0.35 +
        selfEff*0.15
    },
    {
      name:"医療系",
      score:
        big5.C*0.4 +
        big5.A*0.3 +
        riasec.S*0.3 +
        selfEff*0.1
    }
  ];

  return jobs
    .map(j => ({...j, score: Math.round(j.score / 100)}))
    .sort((a,b)=>b.score - a.score)
    .slice(0,3);
}
/* ============================================================
   グラフ描画（Chart.js 不使用の軽量版）
============================================================ */
function drawRadar(big5){
  const ctx = radarCanvas.getContext("2d");
  ctx.clearRect(0,0,radarCanvas.width,radarCanvas.height);

  const labels = ["O","C","E","A","N"];
  const values = [big5.O, big5.C, big5.E, big5.A, big5.N];

  const cx = radarCanvas.width/2;
  const cy = radarCanvas.height/2;
  const maxR = 90;

  ctx.strokeStyle = "rgba(255,255,255,0.15)";
  ctx.lineWidth = 1;

  for(let r=20; r<=maxR; r+=20){
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const angle = (Math.PI*2/5)*i - Math.PI/2;
      const x = cx + r*Math.cos(angle);
      const y = cy + r*Math.sin(angle);
      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.strokeStyle = "#6ee7b7";
  ctx.fillStyle = "rgba(110,231,183,0.25)";
  for(let i=0;i<5;i++){
    const angle = (Math.PI*2/5)*i - Math.PI/2;
    const r = (values[i]/100)*maxR;
    const x = cx + r*Math.cos(angle);
    const y = cy + r*Math.sin(angle);
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.fill();

  ctx.fillStyle = "#9aa4b2";
  ctx.font = "14px sans-serif";
  for(let i=0;i<5;i++){
    const angle = (Math.PI*2/5)*i - Math.PI/2;
    const x = cx + (maxR+20)*Math.cos(angle);
    const y = cy + (maxR+20)*Math.sin(angle);
    ctx.fillText(labels[i], x-6, y+4);
  }
}

/* ============================================================
   RIASEC バーチャート
============================================================ */
function drawBar(riasec){
  const ctx = barCanvas.getContext("2d");
  ctx.clearRect(0,0,barCanvas.width,barCanvas.height);

  const labels = ["R","I","A","S","E","C"];
  const values = [riasec.R, riasec.I, riasec.A, riasec.S, riasec.E, riasec.C];

  const barWidth = 40;
  const gap = 30;
  const baseY = 200;

  ctx.fillStyle = "#6ee7b7";
  ctx.strokeStyle = "rgba(255,255,255,0.2)";
  ctx.lineWidth = 1;

  for(let i=0;i<6;i++){
    const x = 40 + i*(barWidth+gap);
    const h = (values[i]/100)*150;

    ctx.fillRect(x, baseY-h, barWidth, h);

    ctx.fillStyle = "#9aa4b2";
    ctx.font = "14px sans-serif";
    ctx.fillText(labels[i], x+12, baseY+20);

    ctx.fillStyle = "#6ee7b7";
  }
}
